spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    hibernate:
      ddl-auto: validate
  security:
    user:
      name: ${APP_SECURITY_USER}
      password: ${APP_SECURITY_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}

weather:
  api:
    url: ${WEATHER_API_URL}

market:
  api:
    url: ${MARKET_API_URL}
    key: ${MARKET_API_KEY}

logging:
  level:
    root: INFO
