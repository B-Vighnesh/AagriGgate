spring:
  application:
    name: aagrigate
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret: ${JWT_SECRET}

weather:
  api:
    url: ${WEATHER_API_URL:https://api.weatherapi.com/v1/current.json}
    key: ${WEATHER_API_KEY}

market:
  api:
    url: ${MARKET_API_URL:https://api.data.gov.in/resource/35985678-0d79-46b4-9ed6-6f13308a1d24}
    key: ${MARKET_API_KEY}

news:
  api:
    key: ${NEWS_API_KEY}
    gnews-url: ${NEWS_GNEWS_URL:https://gnews.io/api/v4}
    rss-timeout-seconds: 10
    max-items-per-source: 100

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

server:
  port: ${SERVER_PORT:8080}
