spring:
  config:
      import: optional:file:backend/.env[.properties],optional:file:.env[.properties]
  application:
    name: aagrigate
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret: ${JWT_SECRET}

weather:
  api:
    url: ${WEATHER_API_URL}
    key: ${WEATHER_API_KEY}

market:
  api:
    url: ${MARKET_API_URL}
    key: ${MARKET_API_KEY}
    ingest-on-startup: ${MARKET_API_INGEST_ON_STARTUP:false}
    startup-state: ${MARKET_API_STARTUP_STATE:Karnataka}
    startup-district: ${MARKET_API_STARTUP_DISTRICT:Bangalore}

news:
  api:
    key: ${NEWS_API_KEY}
    gnews-url: ${NEWS_GNEWS_URL}
    rss-timeout-seconds: 10
    max-items-per-source: 100

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

server:
  port: ${SERVER_PORT:8080}
